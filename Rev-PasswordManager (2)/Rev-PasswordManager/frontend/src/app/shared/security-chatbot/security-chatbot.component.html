<div class="chatbot-widget">
  <!-- Floating Button -->
  <button
    *ngIf="!isOpen"
    (click)="toggleChat()"
    class="chatbot-trigger"
    aria-label="Open Security Chatbot"
  >
    <lucide-icon name="bot" [size]="24"></lucide-icon>
    
    <!-- Notification dot -->
    <span class="notification-dot"></span>
  </button>

  <!-- Chat Window -->
  <div
    *ngIf="isOpen"
    class="chat-window"
  >
  <!-- Header -->
  <div class="chat-header">
    <div class="chat-header-info">
      <div class="chat-header-icon">
        <lucide-icon name="shield" [size]="20"></lucide-icon>
      </div>
      <div class="chat-header-text">
        <h3>RevSecurity AI</h3>
        <p class="chat-status">
          <span class="status-dot"></span>
          Online
        </p>
      </div>
    </div>
    <button
      (click)="toggleChat()"
      class="close-btn"
      aria-label="Close Chat"
    >
      <lucide-icon name="x" [size]="20"></lucide-icon>
    </button>
  </div>

  <!-- Messages Area -->
  <div 
    #scrollContainer 
    class="chat-messages"
  >
    <div
      *ngFor="let msg of messages"
      class="message-row"
      [ngClass]="msg.role === 'user' ? 'user-msg' : 'bot-msg'"
    >
      <!-- Assistant Avatar -->
      <div *ngIf="msg.role === 'assistant'" class="bot-avatar">
        <lucide-icon name="bot" [size]="16"></lucide-icon>
      </div>

      <div
        class="message-bubble"
        [ngClass]="msg.role === 'user' ? 'user-bubble' : 'bot-bubble'"
      >
        <markdown *ngIf="msg.role === 'assistant'" [data]="msg.content"></markdown>
        <span *ngIf="msg.role === 'user'" style="white-space: pre-wrap;">{{ msg.content }}</span>
      </div>
    </div>

    <!-- Typing Indicator -->
    <div *ngIf="isTyping" class="message-row bot-msg">
      <div class="bot-avatar">
        <lucide-icon name="bot" [size]="16"></lucide-icon>
      </div>
      <div class="message-bubble bot-bubble typing-indicator">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>
    </div>
  </div>

  <!-- Input Area -->
  <div class="chat-input-area">
    <div class="input-wrapper">
      <textarea
        [(ngModel)]="newMessage"
        (keydown.enter)="sendMessage(); $event.preventDefault();"
        [disabled]="isTyping"
        placeholder="Ask about password security..."
        class="chat-textarea"
        rows="1"
      ></textarea>
      
      <button
        (click)="sendMessage()"
        [disabled]="!newMessage.trim() || isTyping"
        class="send-btn"
      >
        <lucide-icon *ngIf="!isTyping" name="send" [size]="18"></lucide-icon>
        <lucide-icon *ngIf="isTyping" name="loader-2" [size]="18" class="spin-icon"></lucide-icon>
      </button>
    </div>
    </div>
    <div class="disclaimer">
      <span>AI-generated. Verify important security info.</span>
    </div>
  </div>
</div>
